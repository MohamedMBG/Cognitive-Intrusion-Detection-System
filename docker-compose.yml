services:

  api:
    build: .
    container_name: unified-ids-api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - unified_ids_db:/app
    env_file: .env
    restart: unless-stopped

  detector:
    build: .
    container_name: unified-ids-detector
    # Root required for raw packet capture
    user: root
    command: python main.py --api
    network_mode: host
    volumes:
      - ./models:/app/models:ro
      - unified_ids_db:/app
    env_file: .env
    restart: unless-stopped

volumes:
  unified_ids_db:
