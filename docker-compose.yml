services:

  api:
    build: .
    container_name: cnds-api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - cnds_db:/app
    env_file: .env
    restart: unless-stopped

  detector:
    build: .
    container_name: cnds-detector
    # Root required for raw packet capture
    user: root
    command: python main.py
    network_mode: host
    volumes:
      - ./models:/app/models:ro
      - cnds_db:/app
    env_file: .env
    restart: unless-stopped

  dashboard:
    build: .
    container_name: cnds-dashboard
    command: >
      sh -c "pip install --quiet streamlit requests pandas &&
             streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    environment:
      - CNDS_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  cnds_db:
